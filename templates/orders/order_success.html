{% extends "base.html" %}

{% block title %}Order Placed | {{ site_name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-xl-8">
        <div class="card border-0 shadow-sm text-center">
            <div class="card-body p-5">
                <span class="badge text-bg-warning rounded-pill mb-3">Order placed</span>
                <h1 class="display-6 fw-bold mb-3">Salamat! Your order is in.</h1>
                <p class="lead text-secondary mb-4">Order <strong>#{{ order.id }}</strong> is now recorded and marked <strong>{{ order.status }}</strong>.</p>
                <div class="d-flex flex-column flex-md-row justify-content-center gap-3">
                    <a class="btn btn-dark btn-lg" href="{% url 'orders:order_detail' order.id %}">View order details</a>
                    <a class="btn btn-outline-dark btn-lg" href="{% url 'products:product_list' %}">Keep shopping</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
