{% extends "base.html" %}
{% load static %}

{% block title %}{{ site_name }} | Shop{% endblock %}

{% block content %}
{{ react_config|json_script:"storefront-config" }}
<div id="storefront-root"></div>

<noscript>
    <section class="market-hero mb-4">
        <div class="market-hero__content">
            <span class="section-kicker">JavaScript is off</span>
            <h1 class="market-hero__title">Fresh catalog, classic rendering.</h1>
            <p class="market-hero__copy mb-0">The React storefront is disabled, so here is the server-rendered fallback in the same organic theme.</p>
        </div>
    </section>

    <div class="section-heading mb-4">
        <div>
            <span class="section-kicker">Featured products</span>
            <h2 class="section-title">Browse the catalog</h2>
        </div>
        <p class="section-copy">The fallback keeps the softer cards, brighter spacing, and product-first layout when JavaScript is unavailable.</p>
    </div>

    <div class="row g-4">
        {% for product in page_obj %}
            <div class="col-md-6 col-xl-4">
                <article class="product-card tone-green">
                    <a href="{% url 'products:product_detail' product.slug %}" class="product-card__media text-decoration-none">
                        {% if product.image %}
                            <img src="{{ product.image.url }}" class="product-image" alt="{{ product.name }}">
                        {% else %}
                            <div class="product-image product-image-placeholder d-flex align-items-center justify-content-center">No image yet</div>
                        {% endif %}
                    </a>
                    <div class="product-card__body">
                        <div class="product-card__topline">
                            <span class="product-card__category">{{ product.category.name }}</span>
                            <span class="product-card__rating">Fresh pick</span>
                        </div>
                        <h2 class="product-card__title">{{ product.name }}</h2>
                        <p class="product-card__description">{{ product.description|truncatewords:18 }}</p>
                        <div class="product-card__bottom">
                            <div>
                                <strong class="product-card__price">PHP {{ product.price }}</strong>
                            </div>
                            <a class="btn btn-success product-card__button" href="{% url 'products:product_detail' product.slug %}">View</a>
                        </div>
                    </div>
                </article>
            </div>
        {% empty %}
            <div class="col-12">
                <div class="empty-state">
                    <h2 class="h4">No products found</h2>
                </div>
            </div>
        {% endfor %}
    </div>
</noscript>
{% endblock %}

{% block extra_js %}
<script type="module" src="{% static 'frontend/storefront.js' %}"></script>
{% endblock %}
