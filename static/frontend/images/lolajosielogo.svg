<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 160" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Lola Josie logo</title>
  <desc id="logoDesc">Rounded green and amber badge with the letters LJ.</desc>
  <defs>
    <linearGradient id="logoGradient" x1="20" y1="20" x2="236" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f1c25c"/>
      <stop offset="0.52" stop-color="#7ecf55"/>
      <stop offset="1" stop-color="#19bf57"/>
    </linearGradient>
    <linearGradient id="leafGradient" x1="152" y1="24" x2="216" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#e8fff0" stop-opacity="0.82"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f7f3a" flood-opacity="0.18"/>
    </filter>
  </defs>
  <g filter="url(#softShadow)">
    <rect x="16" y="16" width="224" height="128" rx="40" fill="url(#logoGradient)"/>
  </g>
  <path d="M180 34c15 0 29 9 36 22-10 9-24 14-38 14-15 0-28-5-39-14 8-13 24-22 41-22Z" fill="url(#leafGradient)" opacity="0.96"/>
  <path d="M174 70c8-10 16-21 20-33" fill="none" stroke="#f7fff9" stroke-linecap="round" stroke-width="4.5" opacity="0.9"/>
  <text x="54" y="95" fill="#ffffff" font-family="Segoe UI, Trebuchet MS, sans-serif" font-size="62" font-weight="800" letter-spacing="-2">LJ</text>
  <rect x="40" y="106" width="72" height="6" rx="3" fill="#ffffff" opacity="0.76"/>
</svg>
